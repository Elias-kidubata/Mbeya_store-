<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBEYA STORE - Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="overlay">

        <header>
            <h2>KARIBU MBEYA STORE</h2>

            <div class="header-buttons">
                <button id="openLoginButton">login</button>
                <button id="openSignupButton">Sign up</button>
            </div>
        </header>

        <div class="login-container">
            <h1>WELCOME TO MBEYA STORE</h1>

            <div class="login-form-wrapper hidden">
                <form id="loginForm">

                    <input
                        type="text"
                        id="username"
                        placeholder="Enter Username"
                        required
                    >

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                        required
                    >

                    <button type="submit">
                        LOGIN
                    </button>

                </form>
            </div>

            <div class="signup-options hidden" id="signupOptionsWrapper">
                
                <button id="googleSignupButton">Sign up with Google</button>
            </div>

        </div>

        <footer>

    

        </footer>

    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="css/javascript/login.js"></script>

</body>
</html>
